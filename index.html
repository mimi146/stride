<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#4f6df5">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Stride — Task Planner</title>
<style>
/* ============ Design tokens ============ */
:root{
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --r-sm: 8px; --r-md: 12px; --r-lg: 18px;
  --shadow-1: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-2: 0 8px 30px rgba(0,0,0,.12);
  --ease: cubic-bezier(.25,.8,.25,1);
  --sidebar-w: 232px;
}
html[data-th="light"]{
  --bg:#f7f7f5; --panel:#ffffff; --panel-2:#f1f1ee; --border:#e6e5e1;
  --text:#1b1b18; --muted:#8a8a83; --faint:#b8b8b0;
  --accent:#4f6df5; --accent-soft:#eceffe; --accent-text:#3d55c8;
  --ok:#2f9e6e; --ok-soft:#e6f5ee; --warn:#d97b28; --warn-soft:#fdf1e3;
  --danger:#d64545; --danger-soft:#fdecec;
  --p1:#d64545; --p2:#d97b28; --p3:#4f6df5;
  --hover:rgba(0,0,0,.035); --active:rgba(0,0,0,.06);
  --overlay:rgba(20,20,18,.35);
}
html[data-th="dark"]{
  --bg:#141416; --panel:#1d1d20; --panel-2:#232327; --border:#2c2c31;
  --text:#ececea; --muted:#8f8f96; --faint:#5c5c63;
  --accent:#7b90ff; --accent-soft:#252a45; --accent-text:#a4b2ff;
  --ok:#4cc593; --ok-soft:#1c3129; --warn:#e79c50; --warn-soft:#39301f;
  --danger:#e46a6a; --danger-soft:#3a2323;
  --p1:#e46a6a; --p2:#e79c50; --p3:#7b90ff;
  --hover:rgba(255,255,255,.045); --active:rgba(255,255,255,.08);
  --overlay:rgba(0,0,0,.55);
  --shadow-1: 0 1px 3px rgba(0,0,0,.3);
  --shadow-2: 0 8px 30px rgba(0,0,0,.5);
}
/* Paper — warm sepia light */
html[data-th="sepia"]{
  --bg:#f6f1e7; --panel:#fdfaf3; --panel-2:#efe8d9; --border:#e3dac6;
  --text:#3d3629; --muted:#8f8672; --faint:#bdb49e;
  --accent:#b0713f; --accent-soft:#f3e5d1; --accent-text:#8a5426;
  --ok:#5d8f5f; --ok-soft:#e7f0e5; --warn:#c07f2e; --warn-soft:#f7ecd9;
  --danger:#bf5544; --danger-soft:#f8e6e1;
  --p1:#bf5544; --p2:#c07f2e; --p3:#b0713f;
  --hover:rgba(80,60,20,.05); --active:rgba(80,60,20,.08);
  --overlay:rgba(60,48,28,.35);
}
/* Blossom — soft rose light */
html[data-th="rose"]{
  --bg:#faf4f6; --panel:#fffbfc; --panel-2:#f4e9ee; --border:#ecdce3;
  --text:#2e2228; --muted:#94808b; --faint:#c2b2ba;
  --accent:#c2557f; --accent-soft:#f7e3ee; --accent-text:#a43e68;
  --ok:#3f9d78; --ok-soft:#e3f2ec; --warn:#cd7d3a; --warn-soft:#f9ecdf;
  --danger:#cf4f5e; --danger-soft:#fae5e8;
  --p1:#cf4f5e; --p2:#cd7d3a; --p3:#c2557f;
  --hover:rgba(120,40,80,.045); --active:rgba(120,40,80,.075);
  --overlay:rgba(60,30,45,.35);
}
/* Forest — deep green dark */
html[data-th="forest"]{
  --bg:#101713; --panel:#18211b; --panel-2:#1e2a22; --border:#2a3a2f;
  --text:#e4ece5; --muted:#8ba393; --faint:#56695c;
  --accent:#6fbf8c; --accent-soft:#1e3328; --accent-text:#93d8ab;
  --ok:#7ac98f; --ok-soft:#1d3526; --warn:#d9a355; --warn-soft:#37301d;
  --danger:#d97060; --danger-soft:#3a2521;
  --p1:#d97060; --p2:#d9a355; --p3:#6fbf8c;
  --hover:rgba(255,255,255,.045); --active:rgba(255,255,255,.08);
  --overlay:rgba(0,0,0,.55);
  --shadow-1:0 1px 3px rgba(0,0,0,.3); --shadow-2:0 8px 30px rgba(0,0,0,.5);
}
/* Midnight — deep blue dark */
html[data-th="midnight"]{
  --bg:#0d1220; --panel:#141a2c; --panel-2:#1a2136; --border:#252e48;
  --text:#e6eaf6; --muted:#8b93ad; --faint:#545d78;
  --accent:#5f8bff; --accent-soft:#1c2a4d; --accent-text:#9db8ff;
  --ok:#4cc593; --ok-soft:#16322a; --warn:#e0a256; --warn-soft:#382e1c;
  --danger:#e46a7c; --danger-soft:#3a2229;
  --p1:#e46a7c; --p2:#e0a256; --p3:#5f8bff;
  --hover:rgba(255,255,255,.045); --active:rgba(255,255,255,.08);
  --overlay:rgba(0,0,0,.58);
  --shadow-1:0 1px 3px rgba(0,0,0,.32); --shadow-2:0 8px 30px rgba(0,0,0,.52);
}
/* Ink — monochrome light */
html[data-th="mono"]{
  --bg:#f5f5f4; --panel:#ffffff; --panel-2:#ececea; --border:#e0e0dd;
  --text:#171717; --muted:#7a7a76; --faint:#b3b3ae;
  --accent:#232323; --accent-soft:#e9e9e7; --accent-text:#111111;
  --ok:#2f7d4f; --ok-soft:#e7f0ea; --warn:#8a6a2f; --warn-soft:#f1ecdf;
  --danger:#a13c3c; --danger-soft:#f5e6e6;
  --p1:#a13c3c; --p2:#8a6a2f; --p3:#232323;
  --hover:rgba(0,0,0,.04); --active:rgba(0,0,0,.07);
  --overlay:rgba(25,25,25,.38);
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:var(--font); background:var(--bg); color:var(--text);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer}
input,textarea,select{font:inherit; color:inherit}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px}
::placeholder{color:var(--faint)}

/* ============ Layout ============ */
.app{display:flex; height:100dvh}
main{flex:1; display:flex; flex-direction:column; min-width:0}

/* ---- Sidebar ---- */
.sidebar{
  width:var(--sidebar-w); flex-shrink:0; padding:20px 12px;
  display:flex; flex-direction:column; gap:2px;
  border-right:1px solid var(--border); background:var(--panel);
}
.logo{display:flex; align-items:center; gap:10px; padding:4px 10px 18px; font-weight:700; font-size:17px; letter-spacing:-.02em}
.logo svg{flex-shrink:0}
.nav-btn{
  display:flex; align-items:center; gap:11px; width:100%;
  padding:8px 10px; border-radius:var(--r-sm); font-size:14.5px; font-weight:500;
  color:var(--muted); transition:background .15s var(--ease), color .15s var(--ease);
  text-align:left;
}
.nav-btn:hover{background:var(--hover); color:var(--text)}
.nav-btn.active{background:var(--accent-soft); color:var(--accent-text); font-weight:600}
.nav-btn .count{margin-left:auto; font-size:12px; font-weight:600; color:var(--faint); font-variant-numeric:tabular-nums}
.nav-btn.active .count{color:var(--accent-text)}
.nav-btn svg{flex-shrink:0; opacity:.85}
.nav-sep{height:1px; background:var(--border); margin:12px 10px}
.nav-label{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--faint); padding:4px 10px 6px}
.sidebar-foot{margin-top:auto; display:flex; gap:4px; padding-top:10px}
.icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius:var(--r-sm); color:var(--muted);
  transition:background .15s, color .15s;
}
.icon-btn:hover{background:var(--hover); color:var(--text)}

/* ---- Header / capture ---- */
.topbar{
  display:flex; align-items:center; gap:12px;
  padding:16px 28px 12px; flex-shrink:0;
}
.view-title{font-size:21px; font-weight:700; letter-spacing:-.02em; white-space:nowrap}
.view-sub{font-size:13px; color:var(--muted); margin-top:1px}
.topbar-actions{margin-left:auto; display:flex; gap:6px; align-items:center}
.pill-btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:7px 14px; border-radius:99px; font-size:13.5px; font-weight:600;
  background:var(--accent); color:#fff; transition:transform .12s var(--ease), filter .15s;
  box-shadow:var(--shadow-1);
}
.pill-btn:hover{filter:brightness(1.07)}
.pill-btn:active{transform:scale(.97)}
.pill-btn.ghost{background:var(--panel); color:var(--text); border:1px solid var(--border); box-shadow:none}
.pill-btn.ghost:hover{background:var(--hover)}

.capture-wrap{padding:0 28px 4px; flex-shrink:0}
.capture{
  display:flex; align-items:center; gap:10px;
  background:var(--panel); border:1px solid var(--border); border-radius:var(--r-md);
  padding:11px 16px; box-shadow:var(--shadow-1);
  transition:border-color .2s, box-shadow .2s;
}
.capture:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.capture input{flex:1; border:none; outline:none; background:none; font-size:15px}
.capture .hint{font-size:11.5px; color:var(--faint); white-space:nowrap; font-family:var(--mono)}
.capture svg{color:var(--faint); flex-shrink:0}

/* ---- Content ---- */
.content{flex:1; overflow-y:auto; padding:14px 28px 90px; scroll-behavior:smooth}
.content::-webkit-scrollbar{width:10px}
.content::-webkit-scrollbar-thumb{background:var(--border); border-radius:99px; border:3px solid var(--bg)}
.group{margin-bottom:26px; animation:fadeUp .25s var(--ease)}
.group-head{display:flex; align-items:baseline; gap:9px; padding:0 4px 8px}
.group-title{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted)}
.group-meta{font-size:12px; color:var(--faint); font-variant-numeric:tabular-nums}
.group-meta.over{color:var(--warn); font-weight:600}
@keyframes fadeUp{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

/* ---- Task rows ---- */
.task{
  display:flex; align-items:flex-start; gap:12px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--r-md); padding:11px 14px; margin-bottom:7px;
  cursor:pointer; position:relative;
  transition:background .15s, border-color .15s, opacity .3s, transform .15s var(--ease);
  box-shadow:var(--shadow-1);
}
.task:hover{border-color:var(--faint)}
.task.dragging{opacity:.4}
.task.drop-above{box-shadow:0 -2px 0 var(--accent), var(--shadow-1)}
.task.drop-below{box-shadow:0 2px 0 var(--accent), var(--shadow-1)}
.task.selected{border-color:var(--accent)}
.task.done{opacity:.55}
.task.done .task-title{text-decoration:line-through; color:var(--muted)}
.task.mit::before{
  content:""; position:absolute; left:0; top:10px; bottom:10px; width:3px;
  border-radius:99px; background:var(--accent);
}
.check{
  width:20px; height:20px; border-radius:7px; border:1.5px solid var(--faint);
  flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center;
  transition:all .15s var(--ease); background:transparent;
}
.check:hover{border-color:var(--ok); background:var(--ok-soft)}
.check.p1{border-color:var(--p1)} .check.p2{border-color:var(--p2)} .check.p3{border-color:var(--p3)}
.check.on{background:var(--ok); border-color:var(--ok)}
.check svg{opacity:0; transform:scale(.5); transition:all .15s var(--ease); color:#fff}
.check.on svg{opacity:1; transform:scale(1)}
.task-body{flex:1; min-width:0}
.task-title{font-weight:500; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.task-meta{display:flex; flex-wrap:wrap; gap:6px; margin-top:5px}
.chip{
  display:inline-flex; align-items:center; gap:4px;
  font-size:11.5px; font-weight:600; padding:2px 8px; border-radius:99px;
  background:var(--panel-2); color:var(--muted);
}
.chip.due{background:var(--accent-soft); color:var(--accent-text)}
.chip.overdue{background:var(--danger-soft); color:var(--danger)}
.chip.p1{background:var(--danger-soft); color:var(--p1)}
.chip.p2{background:var(--warn-soft); color:var(--p2)}
.chip.rec{background:var(--ok-soft); color:var(--ok)}
.task-progress{font-size:11.5px; color:var(--faint); font-variant-numeric:tabular-nums}
.triage{display:none; gap:4px; margin-top:8px}
.task:hover .triage, .triage.always{display:flex}
.triage button{
  font-size:11.5px; font-weight:600; padding:3px 10px; border-radius:99px;
  background:var(--panel-2); color:var(--muted); transition:background .15s, color .15s;
}
.triage button:hover{background:var(--accent-soft); color:var(--accent-text)}
.task-side{display:flex; align-items:center; gap:2px; opacity:0; transition:opacity .15s}
.task:hover .task-side{opacity:1}
.task-side .icon-btn{width:28px; height:28px}
.drag-handle{cursor:grab; color:var(--faint)}

/* ---- Empty states ---- */
.empty{
  text-align:center; padding:48px 20px; color:var(--muted); animation:fadeUp .3s var(--ease);
}
.empty-art{margin-bottom:14px; opacity:.95}
.empty h3{font-size:16px; font-weight:650; color:var(--text); margin-bottom:5px}
.empty p{font-size:13.5px; max-width:340px; margin:0 auto; line-height:1.55}

/* ---- Progress ring ---- */
#dayRing{display:flex; align-items:center; margin-left:2px}
#dayRing svg{display:block}
#dayRing text{font-family:var(--font)}

/* ---- Banners ---- */
.banner{
  display:flex; align-items:center; gap:10px; font-size:13.5px;
  padding:10px 14px; border-radius:var(--r-md); margin-bottom:14px;
  animation:fadeUp .25s var(--ease);
}
.banner.warn{background:var(--warn-soft); color:var(--warn)}
.banner.ok{background:var(--ok-soft); color:var(--ok)}
.banner button{margin-left:auto; font-weight:700; font-size:12.5px; white-space:nowrap; text-decoration:underline; text-underline-offset:2px}

/* ---- Detail panel ---- */
.detail{
  width:0; flex-shrink:0; overflow:hidden; background:var(--panel);
  border-left:1px solid var(--border); transition:width .22s var(--ease);
  display:flex; flex-direction:column;
}
.detail.open{width:340px}
.detail-inner{width:340px; padding:20px 22px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:16px}
.detail-title{
  width:100%; border:none; background:none; font-size:17px; font-weight:650;
  resize:none; line-height:1.35; outline:none; font-family:var(--font);
}
.detail-row{display:flex; flex-direction:column; gap:5px}
.detail-row label{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--faint)}
.detail-row input, .detail-row select, .detail-row textarea{
  background:var(--panel-2); border:1px solid transparent; border-radius:var(--r-sm);
  padding:8px 10px; font-size:14px; outline:none; transition:border-color .15s;
}
.detail-row input:focus, .detail-row select:focus, .detail-row textarea:focus{border-color:var(--accent)}
.detail-row textarea{resize:vertical; min-height:64px; font-family:var(--font)}
.detail-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.seg{display:flex; background:var(--panel-2); border-radius:var(--r-sm); padding:3px; gap:3px}
.seg button{flex:1; padding:5px 4px; font-size:12.5px; font-weight:600; border-radius:6px; color:var(--muted)}
.seg button.on{background:var(--panel); color:var(--text); box-shadow:var(--shadow-1)}
.seg button.on.p1{color:var(--p1)} .seg button.on.p2{color:var(--p2)} .seg button.on.p3{color:var(--p3)}
.subtask{display:flex; align-items:center; gap:9px; padding:5px 0}
.subtask input[type=text]{flex:1; background:none; border:none; outline:none; font-size:14px; padding:0}
.subtask.done input[type=text]{text-decoration:line-through; color:var(--muted)}
.subtask .check{width:17px; height:17px; border-radius:6px; margin:0}
.subtask .rm{opacity:0; color:var(--faint); font-size:15px; line-height:1}
.subtask:hover .rm{opacity:1}
.add-sub{display:flex; align-items:center; gap:9px; color:var(--faint); font-size:14px; padding:5px 0; width:100%; text-align:left}
.add-sub:hover{color:var(--accent-text)}
.detail-foot{padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:8px}
.detail-foot .del{color:var(--danger); font-size:13px; font-weight:600; margin-left:auto; padding:6px 10px; border-radius:var(--r-sm)}
.detail-foot .del:hover{background:var(--danger-soft)}
.link-list{display:flex; flex-direction:column; gap:4px}
.link-list a{color:var(--accent-text); font-size:13.5px; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.link-list a:hover{text-decoration:underline}
.link-item{display:flex; align-items:center; gap:6px}
.link-item .rm{color:var(--faint); font-size:14px}

/* ---- Overlays ---- */
.overlay{
  position:fixed; inset:0; background:var(--overlay); z-index:50;
  display:flex; align-items:flex-start; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .18s var(--ease);
  backdrop-filter:blur(2px);
}
.overlay.show{opacity:1; pointer-events:auto}
.modal{
  background:var(--panel); border-radius:var(--r-lg); box-shadow:var(--shadow-2);
  width:min(560px, calc(100vw - 32px)); margin-top:10vh; max-height:76vh;
  display:flex; flex-direction:column; overflow:hidden;
  transform:translateY(10px) scale(.98); transition:transform .18s var(--ease);
  border:1px solid var(--border);
}
.overlay.show .modal{transform:none}
.modal-head{padding:20px 24px 4px}
.modal-head h2{font-size:18px; font-weight:700; letter-spacing:-.01em}
.modal-head p{font-size:13.5px; color:var(--muted); margin-top:3px}
.modal-body{padding:14px 24px 20px; overflow-y:auto}
.modal-foot{padding:14px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px}

/* command palette */
.palette{margin-top:14vh; width:min(600px, calc(100vw - 32px))}
.palette input{
  width:100%; border:none; outline:none; background:none;
  padding:18px 22px; font-size:16.5px; border-bottom:1px solid var(--border);
}
.palette-list{max-height:46vh; overflow-y:auto; padding:8px}
.pal-item{
  display:flex; align-items:center; gap:12px; padding:10px 14px;
  border-radius:var(--r-sm); font-size:14.5px; cursor:pointer; width:100%; text-align:left;
}
.pal-item .k{margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--faint); background:var(--panel-2); padding:2px 7px; border-radius:5px}
.pal-item.sel{background:var(--accent-soft); color:var(--accent-text)}
.pal-item .sub{color:var(--faint); font-size:12.5px}

/* ---- Focus mode ---- */
.focus-screen{
  position:fixed; inset:0; z-index:60;
  background:radial-gradient(640px 420px at 50% -8%, var(--accent-soft), transparent 68%), var(--bg);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  padding:32px; text-align:center; animation:fadeUp .3s var(--ease);
}
.focus-screen.show{display:flex}
.focus-label{font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin-bottom:18px}
.focus-title{font-size:clamp(24px, 4.5vw, 40px); font-weight:750; letter-spacing:-.025em; max-width:680px; line-height:1.2}
.focus-meta{display:flex; gap:8px; justify-content:center; margin-top:16px}
.focus-timer{font-size:56px; font-weight:200; font-variant-numeric:tabular-nums; margin:34px 0 8px; letter-spacing:.02em; font-family:var(--mono)}
.focus-subs{margin:12px auto 0; max-width:420px; text-align:left; width:100%}
.focus-actions{display:flex; gap:10px; margin-top:34px; flex-wrap:wrap; justify-content:center}
.focus-exit{position:absolute; top:22px; right:26px}
.focus-break{
  font-size:13.5px; color:var(--warn); background:var(--warn-soft);
  padding:8px 16px; border-radius:99px; margin-top:22px; display:none; animation:fadeUp .3s;
}
.focus-break.show{display:inline-block}

/* ---- Plan modal ---- */
.plan-task{
  display:flex; align-items:center; gap:12px; padding:11px 14px;
  border:1px solid var(--border); border-radius:var(--r-md); margin-bottom:8px;
  background:var(--panel-2);
}
.plan-task .n{
  width:24px; height:24px; border-radius:99px; background:var(--accent); color:#fff;
  font-size:12.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.plan-task .why{font-size:12px; color:var(--muted)}
.plan-load{font-size:13.5px; color:var(--muted); padding:6px 2px 12px}
.plan-load b{color:var(--text)}

/* ---- Habits ---- */
.habit{
  display:flex; align-items:center; gap:14px; background:var(--panel);
  border:1px solid var(--border); border-radius:var(--r-md); padding:13px 16px; margin-bottom:8px;
  box-shadow:var(--shadow-1);
}
.habit .check{width:24px; height:24px; border-radius:99px; margin:0}
.habit-name{font-weight:550; flex:1}
.habit-streak{font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums}
.habit-week{display:flex; gap:4px}
.hdot{width:9px; height:9px; border-radius:99px; background:var(--panel-2); border:1px solid var(--border)}
.hdot.on{background:var(--ok); border-color:var(--ok)}
.habit .rm{opacity:0; color:var(--faint)}
.habit:hover .rm{opacity:1}

/* ---- Review / trends ---- */
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:22px}
.stat{background:var(--panel); border:1px solid var(--border); border-radius:var(--r-md); padding:16px; box-shadow:var(--shadow-1)}
.stat .v{font-size:26px; font-weight:750; letter-spacing:-.02em; font-variant-numeric:tabular-nums}
.stat .l{font-size:12px; color:var(--muted); margin-top:2px}
.bars{display:flex; align-items:flex-end; gap:6px; height:110px; padding:14px 4px 4px}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end}
.bar{width:100%; max-width:34px; background:var(--accent); border-radius:6px 6px 3px 3px; min-height:3px; opacity:.85; transition:height .4s var(--ease)}
.bar.zero{background:var(--panel-2)}
.bar-lab{font-size:10.5px; color:var(--faint)}
.trend-note{font-size:13px; color:var(--muted); padding:10px 4px}

/* ---- Projects ---- */
.proj-head-row{display:flex; align-items:center; gap:8px}
.proj-dot{width:9px; height:9px; border-radius:99px; flex-shrink:0}
.proj-prog{height:4px; background:var(--panel-2); border-radius:99px; overflow:hidden; margin:8px 4px 16px}
.proj-prog i{display:block; height:100%; background:var(--accent); border-radius:99px; transition:width .4s var(--ease)}

/* ---- Toast ---- */
.toast-wrap{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:80; display:flex; flex-direction:column; gap:8px; align-items:center}
.toast{
  background:var(--text); color:var(--bg); font-size:13.5px; font-weight:550;
  padding:10px 18px; border-radius:99px; box-shadow:var(--shadow-2);
  animation:toastIn .25s var(--ease); display:flex; gap:12px; align-items:center;
}
.toast button{color:inherit; font-weight:750; font-size:13px; opacity:.85}
.toast button:hover{opacity:1}
@keyframes toastIn{from{opacity:0; transform:translateY(12px)}to{opacity:1; transform:none}}

/* ---- Confetti-lite celebration ---- */
.celebrate{position:fixed; inset:0; pointer-events:none; z-index:90; overflow:hidden}
.celebrate i{position:absolute; width:8px; height:8px; border-radius:2px; top:-12px; animation:fall 1.6s var(--ease) forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg); opacity:.2}}

/* ---- Calendar events ---- */
.cal-ev{
  display:flex; align-items:center; gap:12px; padding:7px 14px; margin-bottom:5px;
  border-radius:var(--r-md); background:var(--panel-2); border:1px dashed var(--border);
  font-size:13.5px; color:var(--muted);
}
.cal-time{font-family:var(--mono); font-size:11.5px; color:var(--accent-text); min-width:44px}
.cal-title{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.cal-dur{font-size:11.5px; color:var(--faint)}

/* ---- Assistant ---- */
.ai-card{background:var(--panel); border:1px solid var(--border); border-radius:var(--r-md); padding:18px 20px; margin-bottom:14px; box-shadow:var(--shadow-1); animation:fadeUp .25s var(--ease)}
.ai-head{display:flex; align-items:center; gap:10px; margin-bottom:8px}
.ai-head h3{font-size:15px; font-weight:700}
.ai-head .when{font-size:12px; color:var(--faint); margin-left:auto}
.ai-report{font-size:15px; line-height:1.7}
.ai-report p, .ai-report li{font-family:ui-serif, "New York", Georgia, serif; font-size:15.5px; color:var(--text)}
.ai-report ul{padding-left:4px; margin:2px 0; list-style:none}
.ai-report ul li{position:relative; padding-left:18px; margin:7px 0}
.ai-report ul li::before{content:""; position:absolute; left:2px; top:.62em; width:6px; height:6px; border-radius:99px; background:var(--accent); opacity:.55}
.ai-report p{margin:7px 0}
.ai-report b{font-weight:640; color:var(--accent-text)}
.ai-sec{padding:15px 2px; border-bottom:1px solid var(--border); animation:fadeUp .3s var(--ease)}
.ai-sec:last-child{border-bottom:none; padding-bottom:4px}
.ai-sec:first-child{padding-top:2px}
.ai-sec-head{display:flex; gap:9px; align-items:center; margin-bottom:4px}
.ai-sec-head svg{color:var(--accent-text); flex:none}
.ai-sec-head h4{font-size:11.5px; font-weight:750; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); font-family:var(--font)}
.ai-next{list-style:none; counter-reset:na; padding:0!important; margin:4px 0}
.ai-next li{counter-increment:na; display:flex; gap:11px; align-items:baseline; padding:8px 0!important; margin:0!important; border-bottom:1px dashed var(--border)}
.ai-next li:last-child{border-bottom:none}
.ai-next li::before{content:counter(na); position:static!important; width:22px; height:22px; border-radius:99px;
  background:var(--accent); color:#fff; font-weight:700; font-size:12px; font-family:var(--font);
  display:inline-flex; align-items:center; justify-content:center; flex:none; opacity:1!important; top:auto!important}
.ai-next-text{flex:1; min-width:0}
.ai-add{font-size:11.5px; font-weight:700; font-family:var(--font); color:var(--accent-text);
  background:var(--accent-soft); padding:3px 11px; border-radius:99px; flex:none; transition:filter .15s}
.ai-add:hover{filter:brightness(1.05)}
.ai-add:disabled{opacity:.65; cursor:default}
.ai-ask{display:flex; gap:8px; margin-top:4px}
.ai-ask input{flex:1; background:var(--panel-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:9px 13px; outline:none; font-size:14px; transition:border-color .15s}
.ai-ask input:focus{border-color:var(--accent)}
.ai-note{font-size:12px; color:var(--faint); padding:8px 4px 0}
.spin{display:inline-block; width:13px; height:13px; border:2px solid var(--accent-soft); border-top-color:var(--accent); border-radius:99px; animation:spin .7s linear infinite; vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---- Theme picker ---- */
.theme-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:10px 0 14px}
.theme-sw{
  display:flex; flex-direction:column; align-items:center; gap:7px;
  font-size:11.5px; font-weight:600; color:var(--muted);
  padding:10px 4px 8px; border-radius:var(--r-sm); border:1.5px solid transparent;
  transition:border-color .15s, background .15s;
}
.theme-sw:hover{background:var(--hover)}
.theme-sw.on{border-color:var(--accent); color:var(--text); background:var(--accent-soft)}
.theme-sw .sw{
  width:28px; height:28px; border-radius:99px; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-1);
}
.theme-sw .sw i{width:11px; height:11px; border-radius:99px; display:block}

/* ---- Settings rows ---- */
.set-row{display:flex; align-items:center; gap:12px; padding:13px 2px; border-bottom:1px solid var(--border); font-size:14.5px}
.set-row:last-child{border-bottom:none}
.set-row .grow{flex:1}
.set-row .sub{font-size:12.5px; color:var(--muted)}
.set-row select, .set-row input[type=number], .set-row input[type=time]{
  background:var(--panel-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:6px 9px; font-size:13.5px;
}
kbd{font-family:var(--mono); font-size:11px; background:var(--panel-2); border:1px solid var(--border); border-bottom-width:2px; padding:2px 6px; border-radius:5px}

/* ---- Mobile ---- */
.mobile-nav{display:none}
@media (max-width:760px){
  .sidebar{display:none}
  .topbar{padding:14px 16px 10px}
  .capture-wrap{padding:0 16px 4px}
  .content{padding:12px 16px 130px}
  .capture .hint{display:none}
  .detail{position:fixed; inset:0; width:100%; z-index:55; border:none; transform:translateY(100%); transition:transform .25s var(--ease)}
  .detail.open{width:100%; transform:none}
  .detail-inner{width:100%}
  .task-side{opacity:1}
  .triage{display:flex}
  .mobile-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:var(--panel); border-top:1px solid var(--border);
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  .mobile-nav button{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10px; font-weight:600; color:var(--muted); padding:6px 2px; border-radius:var(--r-sm);
  }
  .mobile-nav button.active{color:var(--accent-text)}
  .focus-timer{font-size:44px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important; transition-duration:.01ms!important}
}
.sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0)}

<body>
<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="6" fill="var(--accent)"/><path d="M7.5 12.5l3 3 6-6.5" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Stride
    </div>

  <main>

        <button class="pill-btn" id="focusBtn" title="Focus mode (F)">▶ Focus</button>
      </div>

      <div class="capture">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <input id="captureInput" type="text" autocomplete="off" enterkeyhint="done"
          placeholder="What needs doing?  “Review deck tomorrow !high ~45m #work”"
          aria-label="Quick add task">
        <span class="hint">N</span>

  <!-- Detail panel -->

<!-- Overlays -->
<div class="overlay" id="paletteOverlay"><div class="modal palette" role="dialog" aria-label="Command palette">
  <input id="paletteInput" placeholder="Type a command or search tasks…" aria-label="Command palette input">
  <div class="palette-list" id="paletteList"></div>
</div></div>

<div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

<script>
"use strict";
/* ================================================================
   Stride — a calm, fast task planner. Single file, offline-first.
   ================================================================ */

/* ---------- utilities ---------- */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const esc = s => (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
const DAY = 86400000;
const todayStr = () => isoDate(new Date());
function isoDate(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
function parseISO(s) { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); }
function addDays(iso, n) { const d = parseISO(iso); d.setDate(d.getDate() + n); return isoDate(d); }
function daysDiff(iso) { return Math.round((parseISO(iso) - parseISO(todayStr())) / DAY); }
function fmtDue(iso) {
  const n = daysDiff(iso);
  if (n === 0) return "Today"; if (n === 1) return "Tomorrow"; if (n === -1) return "Yesterday";
  if (n < 0) return Math.abs(n) + "d overdue";
  if (n < 7) return parseISO(iso).toLocaleDateString(undefined, { weekday: "long" });
  return parseISO(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function fmtMin(m) { if (!m) return ""; return m >= 60 ? (m % 60 ? Math.floor(m / 60) + "h " + m % 60 + "m" : m / 60 + "h") : m + "m"; }

/* ---------- store ---------- */
const DEFAULTS = {
  v: 1,
  tasks: [], habits: [], projects: [],
  settings: {
    theme: "auto", capacity: 360, remindTime: "09:00", notify: false,
    ai: { provider: "anthropic", key: "", model: "", baseUrl: "" },
    aiAuto: true,
    calendar: { icsUrl: "", useMac: false },
    activity: { enabled: false },
    reminders: { enabled: false }
  },
  actDismissed: [],
  focusLog: [],          // {date, minutes}
  lastPlanDate: null,
  celebratedDates: [],
  aiReport: null, aiReportDate: null, aiAutoDate: null,
  calCache: { ts: 0, events: [] },  // [{date,"HH:MM"|null,mins,title}]
  savedAt: 0
};
function mergeState(d) {
  const s = Object.assign({}, DEFAULTS.settings, d.settings);
  s.ai = Object.assign({}, DEFAULTS.settings.ai, (d.settings || {}).ai);
  s.calendar = Object.assign({}, DEFAULTS.settings.calendar, (d.settings || {}).calendar);
  s.activity = Object.assign({}, DEFAULTS.settings.activity, (d.settings || {}).activity);
  s.reminders = Object.assign({}, DEFAULTS.settings.reminders, (d.settings || {}).reminders);
  return Object.assign({}, JSON.parse(JSON.stringify(DEFAULTS)), d, { settings: s });
}
let db = load();
function load() {
  try {
    const raw = localStorage.getItem("stride.v1");
    if (raw) return mergeState(JSON.parse(raw));
  } catch (e) { console.warn("load failed", e); }
  return JSON.parse(JSON.stringify(DEFAULTS));
}
let saveT;
function save() {
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    db.savedAt = Date.now();
    try { localStorage.setItem("stride.v1", JSON.stringify(db)); } catch (e) { toast("Storage full — export a backup"); }
    scheduleDbPush();
    scheduleRemSync();
  }, 120);
}

/* ---------- SQLite sync (via Stride helper → stride.db) ---------- */
const dbSync = { on: false, at: 0, error: null, inited: false };
let pushT;
function scheduleDbPush() { clearTimeout(pushT); pushT = setTimeout(pushDb, 900); }
async function pushDb() {
  if (!dbSync.inited) return;   // NEVER push before we've checked what stride.db holds
  try {
    const r = await fetch("http://127.0.0.1:8787/state", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ state: db })
    });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error?.message || "HTTP " + r.status);
    dbSync.on = true; dbSync.at = Date.now(); dbSync.error = null;
  } catch (e) { dbSync.on = false; dbSync.error = e.message; }   // offline-first: localStorage still has everything
}
async function initDbSync() {
  try {
    const r = await fetch("http://127.0.0.1:8787/state");
    const j = await r.json();
    const remoteReal = j.exists && j.state && (j.state.tasks || []).length > 0;
    const localUntouched = !db.savedAt;                           // fresh origin / demo seed only
    if (j.exists && j.state && ((j.state.savedAt || 0) > (db.savedAt || 0) || (remoteReal && localUntouched))) {
      db = mergeState(j.state);                                   // stride.db wins: it's newer, or local is just a fresh seed
      try { localStorage.setItem("stride.v1", JSON.stringify(db)); } catch (e) {}
      applyTheme(); render();
    }
    dbSync.on = true; dbSync.at = Date.now();
    dbSync.inited = true;
    if (!j.exists || (db.savedAt || 0) > ((j.state || {}).savedAt || 0)) pushDb();   // seed or refresh — only after comparing
  } catch (e) { dbSync.on = false; dbSync.error = "helper offline"; dbSync.inited = true; }
}

/* ---------- task model ---------- */
function newTask(p) {
  return Object.assign({
    id: uid(), title: "", notes: "", due: null, priority: 0, est: 0,
    project: null, someday: false, done: false, doneAt: null, createdAt: Date.now(),
    subtasks: [], links: [], repeat: null, mit: false, order: Date.now()
  }, p);
}
const tasksOf = f => db.tasks.filter(f).sort((a, b) => (b.mit - a.mit) || (a.order - b.order));
const openTasks = () => db.tasks.filter(t => !t.done);
const isInbox = t => !t.done && !t.due && !t.someday;
const isToday = t => !t.done && t.due && daysDiff(t.due) <= 0;
const isWeek = t => { if (t.done || !t.due) return false; const n = daysDiff(t.due); const dow = (new Date().getDay() + 6) % 7; return n >= 0 && n <= (6 - dow); };
const isUpcoming = t => !t.done && t.due && daysDiff(t.due) > 0;

/* ---------- natural-language capture ---------- */
const WEEKDAYS = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
function parseCapture(raw) {
  let text = " " + raw.trim() + " ";
  const t = newTask({});
  const eat = (re, fn) => { text = text.replace(re, m => { fn(m); return " "; }); };

  eat(/ !(?:1|high|h) /i, () => t.priority = 1);
  eat(/ !(?:2|med|medium|m) /i, () => t.priority = 2);
  eat(/ !(?:3|low|l) /i, () => t.priority = 3);
  eat(/ ~(\d+(?:\.\d+)?)(h|hr|hrs|hours?) /i, m => t.est = Math.round(parseFloat(m.match(/[\d.]+/)[0]) * 60));
  eat(/ ~(\d+)(m|min|mins)? /i, m => t.est = parseInt(m.match(/\d+/)[0]));
  eat(/ #([\w-]+) /i, m => t.project = m.trim().slice(1));
  eat(/ every ?day | daily /i, () => t.repeat = "daily");
  eat(/ every ?week | weekly /i, () => t.repeat = "weekly");
  eat(/ every ?month | monthly /i, () => t.repeat = "monthly");
  eat(/ weekdays /i, () => t.repeat = "weekdays");
  WEEKDAYS.forEach((w, i) => eat(new RegExp(" every " + w + " ", "i"), () => { t.repeat = "weekly"; t.due = nextWeekday(i); }));
  eat(/ today | tod /i, () => t.due = todayStr());
  eat(/ tomorrow | tmrw | tom /i, () => t.due = addDays(todayStr(), 1));
  eat(/ next week /i, () => t.due = addDays(todayStr(), 7));
  eat(/ (?:this )?weekend /i, () => t.due = nextWeekday(6));
  eat(/ someday /i, () => t.someday = true);
  WEEKDAYS.forEach((w, i) => { eat(new RegExp(" (?:on |next )?" + w + " ", "i"), () => { if (!t.due) t.due = nextWeekday(i); }); });
  eat(/ in (\d+) days? /i, m => t.due = addDays(todayStr(), parseInt(m.match(/\d+/)[0])));
  eat(/ (\d{4}-\d{2}-\d{2}) /, m => t.due = m.trim());

  t.title = text.replace(/\s+/g, " ").trim();
  if (t.repeat && !t.due) t.due = todayStr();
  if (t.project && !db.projects.find(p => p.name.toLowerCase() === t.project.toLowerCase())) {
    db.projects.push({ id: uid(), name: t.project, color: projColor(db.projects.length) });
  } else if (t.project) {
    t.project = db.projects.find(p => p.name.toLowerCase() === t.project.toLowerCase()).name;
  }
  return t;
}
function nextWeekday(dow) { const d = new Date(); let n = (dow - d.getDay() + 7) % 7; if (n === 0) n = 7; return addDays(todayStr(), n); }
const PROJ_COLORS = ["#4f6df5", "#2f9e6e", "#d97b28", "#b5559b", "#468f9d", "#d64545", "#7a67d6"];
const projColor = i => PROJ_COLORS[i % PROJ_COLORS.length];
function projByName(n) { return db.projects.find(p => p.name === n); }

/* ---------- recurrence ---------- */
function nextOccurrence(t) {
  const base = t.due && daysDiff(t.due) > 0 ? t.due : todayStr();
  switch (t.repeat) {
    case "daily": return addDays(base, 1);
    case "weekly": return addDays(base, 7);
    case "monthly": { const d = parseISO(base); d.setMonth(d.getMonth() + 1); return isoDate(d); }
    case "weekdays": { let n = addDays(base, 1); while ([0, 6].includes(parseISO(n).getDay())) n = addDays(n, 1); return n; }
  }
  return null;
}

/* ---------- calendar ---------- */
const HELPER = "http://127.0.0.1:8787";
async function proxyFetch(url, opts = {}) {
  try { return await fetch(url, opts); }
  catch (e) {
    // Direct call blocked (usually CORS) — retry through the local Stride helper
    try {
      const u = new URL(url);
      return await fetch(HELPER + u.pathname + u.search, { ...opts, headers: { ...(opts.headers || {}), "x-stride-target": u.origin } });
    } catch (e2) {

  const later = tasksOf(t => !t.done && t.due && daysDiff(t.due) > 14);
  if (later.length) html += group("Later", "", later.map(t => taskRow(t)).join(""));
  return html || emptyState("○", "Nothing scheduled ahead", "Tasks with future dates appear here, grouped by day.");
}
function renderWeek() {

/* ---------- drag & drop ---------- */
let dragId = null;
document.addEventListener("dragstart", e => {
  const el = e.target.closest?.(".task"); if (!el) return;
  dragId = el.dataset.id; el.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
});
document.addEventListener("dragend", () => { dragId = null; $$(".task").forEach(el => el.classList.remove("dragging", "drop-above", "drop-below")); });
document.addEventListener("dragover", e => {
  const el = e.target.closest?.(".task"); if (!el || !dragId || el.dataset.id === dragId) return;
  e.preventDefault();
  const above = e.clientY < el.getBoundingClientRect().top + el.offsetHeight / 2;
  el.classList.toggle("drop-above", above); el.classList.toggle("drop-below", !above);
});
document.addEventListener("dragleave", e => { const el = e.target.closest?.(".task"); if (el) el.classList.remove("drop-above", "drop-below"); });
document.addEventListener("drop", e => {
  const el = e.target.closest?.(".task"); if (!el || !dragId) return;
  e.preventDefault();
  const src = db.tasks.find(t => t.id === dragId), dst = db.tasks.find(t => t.id === el.dataset.id);
  if (!src || !dst || src === dst) return;
  const above = e.clientY < el.getBoundingClientRect().top + el.offsetHeight / 2;
  if (src.due !== dst.due && dst.due) src.due = dst.due;      // dragging across day groups reschedules
  src.order = dst.order + (above ? -0.5 : 0.5);
  db.tasks.filter(t => true).sort((a, b) => a.order - b.order).forEach((t, i) => t.order = i + 1);

});

/* ---------- task actions ---------- */
function findTask(id) { return db.tasks.find(t => t.id === id); }
function completeTask(t) {
  t.done = true; t.doneAt = Date.now(); t.mit = false;
  if (t.repeat) {
    const nxt = newTask({ title: t.title, notes: t.notes, priority: t.priority, est: t.est, project: t.project, repeat: t.repeat, subtasks: t.subtasks.map(s => ({ ...s, done: false })), due: nextOccurrence(t) });
    t.repeat = null; db.tasks.push(nxt);
  }
  maybeCelebrate();
}
function setDue(t, v) {
  t.someday = false;
  t.due = v === "0" ? todayStr() : v === "1" ? addDays(todayStr(), 1) : v === "wk" ? addDays(todayStr(), 7) : v || null;
}
document.addEventListener("click", e => {
  const nav = e.target.closest("[data-view]");
  if (nav) { state.view = nav.dataset.view; state.search = ""; state.selected = null; render(); return; }
  const ab = e.target.closest("[data-ab]");
  if (ab) {
    const s = abandonedSessions()[+ab.dataset.abi];
    if (s) {
      db.actDismissed.push(actKey(s));
      if (ab.dataset.ab === "resume") {

        toast("Added to Today");
      }
      db.actDismissed = db.actDismissed.filter(k => k.startsWith(todayStr()));   // keep it tidy
      save(); render();
    }
    return;
  }
  const navAct = e.target.closest("[data-nav-act]");
  if (navAct) {
    const a = navAct.dataset.navAct;
    if (a === "rebalance") openRebalance();
    else if (a === "plan") openPlan();
    else if (VIEWS[a]) { state.view = a; render(); }
    return;
  }
  const row = e.target.closest(".task");
  if (row) {
    const t = findTask(row.dataset.id); if (!t) return;
    const act = e.target.closest("[data-act]");
    if (act) {
      e.stopPropagation();
      const a = act.dataset.act;
      if (a === "toggle") { t.done ? (t.done = false, t.doneAt = null) : completeTask(t); }
      else if (a === "due") setDue(t, act.dataset.v);
      else if (a === "someday") { t.someday = true; t.due = null; }
      save(); render(); return;
    }
    state.selected = state.selected === t.id ? null : t.id;
    render(); return;
  }
});
document.addEventListener("keydown", e => {

    html += db.habits.map(h => {

}

/* ---------- review / trends ---------- */
function renderReview() {
  const days = [...Array(14)].map((_, i) => addDays(todayStr(), i - 13));
  const counts = days.map(d => db.tasks.filter(t => t.done && t.doneAt && isoDate(new Date(t.doneAt)) === d).length);
  const max = Math.max(1, ...counts);
  const activeDays = counts.filter(c => c > 0).length;
  let streak = 0; for (let i = counts.length - 1; i >= 0 && counts[i] > 0; i--) streak++;
  const focusMin = db.focusLog.filter(f => daysDiff(f.date) > -7).reduce((s, f) => s + f.minutes, 0);
  const doneWeek = counts.slice(-7).reduce((a, b) => a + b, 0);
  return `
  <div class="stat-grid">
    <div class="stat"><div class="v">${streak}</div><div class="l">day streak</div></div>
    <div class="stat"><div class="v">${activeDays}/14</div><div class="l">active days</div></div>
    <div class="stat"><div class="v">${doneWeek}</div><div class="l">done this week</div></div>
    <div class="stat"><div class="v">${fmtMin(focusMin) || "0m"}</div><div class="l">focus time (7d)</div></div>

  ${group("Completions · last 14 days", "", `<div class="bars">${counts.map((c, i) => `
    <div class="bar-col"><div class="bar ${c ? "" : "zero"}" style="height:${Math.max(4, c / max * 100)}%" title="${c} done"></div>
    <span class="bar-lab">${parseISO(days[i]).getDate()}</span></div>`).join("")}</div>`)}
  <p class="trend-note">Stride celebrates showing up, not volume. ${activeDays >= 10 ? "You've been remarkably consistent — protect your rest days too." : activeDays >= 5 ? "Nice rhythm building here. One meaningful task a day is enough." : "Every completed day counts. Start small: one task, done well."}</p>`;
}

/* ---------- focus mode ---------- */
let focus = { taskId: null, start: null, tick: null, breakShown: false };
function focusQueue() { return openTasks().filter(t => !t.someday).sort((a, b) => score(b) - score(a)); }
function startFocus(id) {
  const q = focusQueue();
  const t = id ? findTask(id) : q[0];
  if (!t) { toast("Nothing to focus on — enjoy the calm"); return; }
  focus = { taskId: t.id, start: Date.now(), tick: null, breakShown: false };
  renderFocus(); $("#focusScreen").classList.add("show");
  focus.tick = setInterval(updateFocusTimer, 1000);
}
function renderFocus() {

  $("#focusScreen").innerHTML = `
    <button class="icon-btn focus-exit" id="fExit" aria-label="Exit focus mode (Esc)" style="font-size:18px">✕</button>

    </div>
    <div class="focus-timer" id="fTimer" aria-live="off">00:00</div>
    ${t.subtasks.length ? `<div class="focus-subs">${t.subtasks.map((s, i) => `
      <div class="subtask ${s.done ? "done" : ""}">
        <button class="check ${s.done ? "on" : ""}" data-fsub="${i}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"><path d="M4.5 12.5l5 5 10-11"/></svg></button>
        <input type="text" value="${esc(s.title)}" readonly tabindex="-1">
      </div>`).join("")}</div>` : ""}
    <div class="focus-break" id="fBreak">You've been at it a while — a 5-minute break will help you finish stronger.</div>
    <div class="focus-actions">
      <button class="pill-btn" id="fDone">✓ Done — next</button>
      <button class="pill-btn ghost" id="fSkip">Skip for now</button>
      <button class="pill-btn ghost" id="fLater">→ Tomorrow</button>
    </div>`;
  $("#fExit").onclick = exitFocus;
  $("#fDone").onclick = () => { const t2 = findTask(focus.taskId); logFocus(); completeTask(t2); save(); nextFocus(); };
  $("#fSkip").onclick = () => { logFocus(); nextFocus(focus.taskId); };
  $("#fLater").onclick = () => { const t2 = findTask(focus.taskId); logFocus(); setDue(t2, "1"); t2.mit = false; save(); nextFocus(focus.taskId); };

function nextFocus(excludeId) {
  const q = focusQueue().filter(t => t.id !== excludeId);
  if (!q.length) { exitFocus(); render(); toast("Queue clear. Well done ✦"); return; }
  focus.taskId = q[0].id; focus.start = Date.now(); focus.breakShown = false;
  renderFocus(); render();
}
function updateFocusTimer() {
  if (!focus.start) return;
  const s = Math.floor((Date.now() - focus.start) / 1000);
  const el = $("#fTimer"); if (el) el.textContent = String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
  if (s >= 50 * 60 && !focus.breakShown) { focus.breakShown = true; $("#fBreak")?.classList.add("show"); notify("Time for a short break", "50 minutes of focus — stretch, water, breathe."); }
}
function logFocus() {
  const m = Math.round((Date.now() - focus.start) / 60000);
  if (m >= 1) { const e = db.focusLog.find(f => f.date === todayStr()); e ? e.minutes += m : db.focusLog.push({ date: todayStr(), minutes: m }); save(); }
}
function exitFocus() { if (focus.start) logFocus(); clearInterval(focus.tick); focus = { taskId: null, start: null, tick: null, breakShown: false }; $("#focusScreen").classList.remove("show"); render(); }
$("#focusBtn").addEventListener("click", () => startFocus());

/* ---------- plan my day ---------- */
function whyText(t) {
  if (t.due && daysDiff(t.due) < 0) return "Overdue — clear it first";
  if (t.priority === 1) return "High priority" + (t.due && daysDiff(t.due) === 0 ? ", due today" : "");
  if (t.due && daysDiff(t.due) === 0) return "Due today";
  if (t.est && t.est <= 30) return "Quick win — builds momentum";
  return "Been waiting a while";
}
function openPlan() {
  const top = topThree();
  const load = dayLoad(todayStr());
  const cap = db.settings.capacity;
  const over = load > cap;
  showModal(`
    <div class="modal-head"><h2>✦ Plan your day</h2><p>Three meaningful tasks beat a long list. Here's what matters most:</p></div>
    <div class="modal-body">
      ${top.length ? top.map((t, i) => `<div class="plan-task"><span class="n">${i + 1}</span>
        <div style="flex:1;min-width:0"><div style="font-weight:550">${esc(t.title)}</div><div class="why">${whyText(t)}${t.est ? " · " + fmtMin(t.est) : ""}</div></div></div>`).join("")
      : `<p style="color:var(--muted)">Nothing pending — capture a task first, or enjoy the open day.</p>`}
      <div class="plan-load">${over
        ? `⚠ Today holds <b>${fmtMin(load)}</b> of work against a <b>${fmtMin(cap)}</b> capacity. Consider moving something — sustainable beats heroic.`
        : load ? `Today's plan: <b>${fmtMin(load)}</b> of <b>${fmtMin(cap)}</b> capacity. ${load < cap * .6 ? "Healthy margin for the unexpected." : "A full but fair day."}` : ""}</div>
    </div>
    <div class="modal-foot">
      ${over ? `<button class="pill-btn ghost" id="mRebalance">Rebalance</button>` : ""}
      <button class="pill-btn ghost" id="mCancel">Not now</button>
      ${top.length ? `<button class="pill-btn" id="mAccept">Star these 3</button>` : ""}
    </div>`);
  $("#mCancel").onclick = closeModal;
  $("#mRebalance") && ($("#mRebalance").onclick = () => { closeModal(); openRebalance(); });
  $("#mAccept") && ($("#mAccept").onclick = () => {
    db.tasks.forEach(t => t.mit = false);
    top.forEach(t => { t.mit = true; if (!t.due || daysDiff(t.due) > 0) t.due = todayStr(); });
    db.lastPlanDate = todayStr(); save(); closeModal(); state.view = "today"; render();
    toast("Day planned — your top 3 are starred");
  });
}
$("#planBtn").addEventListener("click", openPlan);

/* ---------- rebalance overloaded days ---------- */
function openRebalance() {
  const over = overloadedDays(14);
  if (!over.length) { toast("No overloaded days — nicely balanced"); return; }
  const suggestions = [];
  over.forEach(o => {
    const list = db.tasks.filter(t => !t.done && t.due === o.date).sort((a, b) => score(a) - score(b)); // least critical first
    let excess = o.load - db.settings.capacity;
    for (const t of list) { if (excess <= 0) break; const target = findLightDay(o.date); suggestions.push({ t, from: o.date, to: target }); excess -= (t.est || 30); }
  });
  showModal(`
    <div class="modal-head"><h2>Rebalance your week</h2><p>These moves bring overloaded days back under ${fmtMin(db.settings.capacity)}:</p></div>
    <div class="modal-body">
      ${suggestions.map((s, i) => `<div class="plan-task"><div style="flex:1;min-width:0">
        <div style="font-weight:550">${esc(s.t.title)}</div>
        <div class="why">${fmtDue(s.from)} → <b style="color:var(--accent-text)">${fmtDue(s.to)}</b>${s.t.est ? " · " + fmtMin(s.t.est) : ""}</div></div>
        <input type="checkbox" checked data-mv="${i}" style="width:17px;height:17px;accent-color:var(--accent)"></div>`).join("")}
    </div>
    <div class="modal-foot"><button class="pill-btn ghost" id="mCancel">Cancel</button><button class="pill-btn" id="mApply">Move selected</button></div>`);
  $("#mCancel").onclick = closeModal;
  $("#mApply").onclick = () => {
    let n = 0;
    $$("#modalBox [data-mv]").forEach(cb => { if (cb.checked) { const s = suggestions[+cb.dataset.mv]; s.t.due = s.to; n++; } });
    save(); closeModal(); render(); toast(n + " task" + (n === 1 ? "" : "s") + " moved — breathing room restored");
  };
}
function findLightDay(after) {
  for (let i = 1; i <= 21; i++) { const d = addDays(after, i); if (dayLoad(d) + dayMeetingMin(d) < db.settings.capacity * .7) return d; }
  return addDays(after, 1);
}

/* ---------- command palette ---------- */
const COMMANDS = [
  { label: "Go to Today", k: "1", run: () => go("today") }, { label: "Go to Inbox", k: "2", run: () => go("inbox") },
  { label: "Go to Upcoming", k: "3", run: () => go("upcoming") }, { label: "Go to This Week", k: "4", run: () => go("week") },
  { label: "Go to Someday", k: "5", run: () => go("someday") }, { label: "Go to Projects", k: "6", run: () => go("projects") },
  { label: "Go to Habits", k: "7", run: () => go("habits") }, { label: "Go to Review", k: "8", run: () => go("review") },
  { label: "Go to Assistant", k: "9", run: () => go("coach") },
  { label: "Analyze my habits & workload (AI)", run: () => { go("coach"); setTimeout(() => { const b = $("#aiAnalyzeBtn"); b ? runAnalysis(b) : toast("Connect an AI provider first"); }, 60); } },
  { label: "Plan my day", k: "P", run: () => { closePalette(); openPlan(); } },
  { label: "Start Focus mode", k: "F", run: () => { closePalette(); startFocus(); } },
  { label: "Rebalance overloaded days", run: () => { closePalette(); openRebalance(); } },
  { label: "Toggle theme", k: "T", run: () => { closePalette(); cycleTheme(); } },
  { label: "Export backup (JSON)", run: () => { closePalette(); exportBackup(); } },
  { label: "Import backup", run: () => { closePalette(); importBackup(); } },
  { label: "Export calendar (.ics)", run: () => { closePalette(); exportICS(); } },
  { label: "Settings", run: () => { closePalette(); openSettings(); } },
  { label: "Keyboard shortcuts", k: "?", run: () => { closePalette(); openHelp(); } },
];
function go(v) { state.view = v; state.search = ""; closePalette(); render(); }
function openPalette() { $("#paletteOverlay").classList.add("show"); const i = $("#paletteInput"); i.value = ""; state.palIdx = 0; renderPalette(""); setTimeout(() => i.focus(), 40); }
function closePalette() { $("#paletteOverlay").classList.remove("show"); }
function palItems(q) {
  q = q.toLowerCase().trim();
  const cmds = COMMANDS.filter(c => c.label.toLowerCase().includes(q)).map(c => ({ type: "cmd", ...c }));
  const tasks = q ? db.tasks.filter(t => !t.done && t.title.toLowerCase().includes(q)).slice(0, 6).map(t => ({ type: "task", label: t.title, sub: t.due ? fmtDue(t.due) : t.someday ? "Someday" : "Inbox", id: t.id })) : [];
  return [...tasks, ...cmds].slice(0, 12);
}
function renderPalette(q) {
  const items = palItems(q);
  state.palIdx = clamp(state.palIdx, 0, Math.max(0, items.length - 1));
  $("#paletteList").innerHTML = items.map((it, i) => `
    <button class="pal-item ${i === state.palIdx ? "sel" : ""}" data-pi="${i}">
      <span>${it.type === "task" ? "○" : "»"}</span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.label)}${it.sub ? ` <span class="sub">${esc(it.sub)}</span>` : ""}</span>
      ${it.k ? `<span class="k">${it.k}</span>` : ""}</button>`).join("") || `<div class="empty" style="padding:24px"><p>No matches</p></div>`;
  $$("#paletteList .pal-item").forEach(b => b.onclick = () => runPal(items[+b.dataset.pi]));
}
function runPal(it) {
  if (!it) return;
  if (it.type === "task") { closePalette(); state.selected = it.id; const t = findTask(it.id); state.view = t.someday ? "someday" : t.due ? (daysDiff(t.due) <= 0 ? "today" : "upcoming") : "inbox"; render(); }
  else it.run();
}
$("#paletteInput").addEventListener("input", e => { state.palIdx = 0; renderPalette(e.target.value); });
$("#paletteInput").addEventListener("keydown", e => {
  const items = palItems(e.target.value);
  if (e.key === "ArrowDown") { e.preventDefault(); state.palIdx = Math.min(items.length - 1, state.palIdx + 1); renderPalette(e.target.value); }
  else if (e.key === "ArrowUp") { e.preventDefault(); state.palIdx = Math.max(0, state.palIdx - 1); renderPalette(e.target.value); }
  else if (e.key === "Enter") { e.preventDefault(); runPal(items[state.palIdx]); }
  else if (e.key === "Escape") closePalette();
});
$("#paletteOverlay").addEventListener("click", e => { if (e.target === e.currentTarget) closePalette(); });

/* ---------- keyboard shortcuts ---------- */
document.addEventListener("keydown", e => {
  const inField = /INPUT|TEXTAREA|SELECT/.test(e.target.tagName);
  if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); openPalette(); return; }
  if (e.key === "Escape") {
    if ($("#paletteOverlay").classList.contains("show")) return closePalette();
    if ($("#modalOverlay").classList.contains("show")) return closeModal();
    if ($("#focusScreen").classList.contains("show")) return exitFocus();
    if (state.selected) { state.selected = null; render(); return; }
    if (state.search) { state.search = ""; render(); return; }
    if (inField) e.target.blur();
    return;
  }
  if (inField || e.metaKey || e.ctrlKey || e.altKey) return;
  const keys = {
    n: () => $("#captureInput").focus(),
    "/": () => { const q = prompt("Search tasks"); if (q !== null) { state.search = q.trim(); render(); } },
    f: () => startFocus(), p: openPlan, t: cycleTheme, "?": openHelp,
    1: () => go("inbox") || 0, 2: () => go("today"), 3: () => go("upcoming"), 4: () => go("week"),
    5: () => go("someday"), 6: () => go("projects"), 7: () => go("habits"), 8: () => go("review"),
    9: () => go("coach"),
  };
  // remap: 1=today feels more natural
  keys[1] = () => go("today"); keys[2] = () => go("inbox");
  if (keys[e.key]) { e.preventDefault(); keys[e.key](); }
});

function applyTheme() {
  let t = db.settings.theme;
  if (!THEMES.some(x => x.id === t)) t = "auto";
  if (t === "auto") t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  document.documentElement.setAttribute("data-th", t);
}
function setTheme(id) {
  db.settings.theme = id; save(); applyTheme();
  toast("Theme: " + (THEMES.find(x => x.id === id) || {}).label);
}
function cycleTheme() {
  const i = THEMES.findIndex(x => x.id === db.settings.theme);
  setTheme(THEMES[(i + 1) % THEMES.length].id);
}
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyTheme);

/* ---------- backup & calendar ---------- */
function download(name, mime, content) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content], { type: mime })); a.download = name;
  a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
function exportBackup() { download("stride-backup-" + todayStr() + ".json", "application/json", JSON.stringify(db, null, 2)); toast("Backup exported"); }
function importBackup() {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json";
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { try { const d = JSON.parse(r.result); if (!Array.isArray(d.tasks)) throw 0; db = mergeState(d); save(); render(); applyTheme(); toast("Backup restored"); } catch { toast("Couldn't read that file"); } };
    r.readAsText(f);
  };
  inp.click();
}
function exportICS() {
  const dated = db.tasks.filter(t => !t.done && t.due);
  if (!dated.length) { toast("No dated tasks to export"); return; }
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Stride//EN"];
  dated.forEach(t => {
    const d = t.due.replace(/-/g, "");
    lines.push("BEGIN:VEVENT", "UID:" + t.id + "@stride", "DTSTART;VALUE=DATE:" + d, "DTEND;VALUE=DATE:" + d,
      "SUMMARY:" + t.title.replace(/[,;\\]/g, " "), t.notes ? "DESCRIPTION:" + t.notes.replace(/\n/g, " ").slice(0, 200) : "", "END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  download("stride-tasks.ics", "text/calendar", lines.filter(Boolean).join("\r\n"));
  toast("Calendar file exported");
}

/* ---------- AI assistant ---------- */
const PROVIDERS = {
  anthropic:  { label: "Anthropic (Claude)",        base: "https://api.anthropic.com",        model: "claude-haiku-4-5-20251001", hint: "sk-ant-…" },
  openai:     { label: "OpenAI",                    base: "https://api.openai.com/v1",        model: "gpt-4o-mini",               hint: "sk-…" },
  nvidia:     { label: "NVIDIA NIM",                base: "https://integrate.api.nvidia.com/v1", model: "minimaxai/minimax-m3",      hint: "nvapi-…" },
  openrouter: { label: "OpenRouter",                base: "https://openrouter.ai/api/v1",     model: "anthropic/claude-3.5-haiku", hint: "sk-or-…" },
  custom:     { label: "Custom (OpenAI-compatible)", base: "",                                model: "",                          hint: "your key" },
  custom_anthropic: { label: "Custom (Anthropic-compatible)", base: "",                       model: "claude-sonnet-5",           hint: "your key" }
};
const aiCfg = () => db.settings.ai;
const aiReady = () => !!(aiCfg().key && (!aiCfg().provider.startsWith("custom") || aiCfg().baseUrl));

async function callAI(system, user, maxTokens = 3000) {
  const { provider, key, model, baseUrl } = aiCfg();
  const P = PROVIDERS[provider];
  const mdl = (model || P.model).trim();
  const doFetch = proxyFetch;
  if (!mdl) throw new Error("Set a model name in Settings → AI assistant.");
  let r, j;
  if (provider === "anthropic" || provider === "custom_anthropic") {
    const aBase = (provider === "custom_anthropic" ? baseUrl : P.base).replace(/\/+$/, "").replace(/\/v1$/, "");
    r = await doFetch(aBase + "/v1/messages", {
      method: "POST",
      headers: {
        "content-type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true",
        ...(provider === "custom_anthropic" ? { "authorization": "Bearer " + key } : {})
      },
      body: JSON.stringify({ model: mdl, max_tokens: maxTokens, system, messages: [{ role: "user", content: user }] })
    });
    j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error?.message || "API error " + r.status);
    return (j.content || []).filter(c => c.type === "text" || c.text).map(c => c.text || "").join("");
  }
  const base = (provider === "custom" ? baseUrl : P.base).replace(/\/+$/, "");
  r = await doFetch(base + "/chat/completions", {
    method: "POST",
    headers: {
      "content-type": "application/json", "authorization": "Bearer " + key, "accept": "application/json",
      ...(provider === "openrouter" ? { "HTTP-Referer": "https://stride.app", "X-Title": "Stride" } : {})
    },
    body: JSON.stringify({ model: mdl, max_tokens: maxTokens, stream: false, messages: [{ role: "system", content: system }, { role: "user", content: user }] })
  });
  j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error?.message || j.detail || "API error " + r.status);
  const msg = j.choices?.[0]?.message || {};
  // Reasoning models (MiniMax, DeepSeek-R1, …) may think in <think> tags or a separate field
  let out = msg.content || "";
  if (!out.replace(/<think>[\s\S]*?(<\/think>|$)/g, "").trim() && msg.reasoning_content) out = msg.reasoning_content;
  out = out.replace(/<think>[\s\S]*?(<\/think>|$)/g, "").trim();
  if (!out) throw new Error("Empty response — the model may need a larger max_tokens or a different model name.");
  return out;
}

function contextSummary() {
  const open = openTasks().filter(t => !t.someday).sort((a, b) => score(b) - score(a)).slice(0, 40)
    .map(t => `- ${t.title}${t.due ? " | due " + fmtDue(t.due) : " | no date"}${t.priority ? " | " + ["", "high", "med", "low"][t.priority] : ""}${t.est ? " | ~" + fmtMin(t.est) : ""}${t.project ? " | #" + t.project : ""}${t.subtasks.length ? ` | steps ${t.subtasks.filter(s => s.done).length}/${t.subtasks.length}` : ""}`);
  const days = [...Array(14)].map((_, i) => addDays(todayStr(), i - 13));
  const doneRow = days.map(d => db.tasks.filter(t => t.done && t.doneAt && isoDate(new Date(t.doneAt)) === d).length);
  const habits = db.habits.map(h => {
    const rate = days.filter(d => h.log.includes(d)).length;
    return `- "${h.name}": ${habitStreak(h)}-day streak, done ${rate}/14 recent days`;
  });
  const over = overloadedDays(7).map(o => `${fmtDue(o.date)} (${fmtMin(o.load)})`);
  const focusMin = db.focusLog.filter(f => daysDiff(f.date) > -7).reduce((s, f) => s + f.minutes, 0);
  const calDays = [];
  for (let i = 0; i <= 7; i++) {
    const d = addDays(todayStr(), i), evs = eventsOn(d);
    if (evs.length) calDays.push(`- ${fmtDue(d)}: ` + evs.map(e => `${e.time || "all-day"} ${e.title}${e.mins ? " (" + fmtMin(e.mins) + ")" : ""}`).join("; "));
  }
  const risks = detectRisks().map(x => "- " + x.msg);
  let act = "";
  if (actCache.data && actCache.data.samples) {
    const a = actCache.data;
    act = "\nMac activity today (top apps): " + a.topApps.map(x => `${x.app} ${fmtMin(x.mins)}`).join("; ") +
      "\nNotable work sessions:\n" + a.sessions.slice(-10).map(s => `- ${fmtClock(s.start)}–${fmtClock(s.end)} ${s.app}${s.title ? " — “" + s.title + "”" : ""} (${s.mins}m)`).join("\n") +
      (abandonedSessions().length ? "\nLeft unfinished (no return in 90+ min):\n" + abandonedSessions().map(s => `- “${s.title || s.app}” (${s.mins}m at ${fmtClock(s.start)})`).join("\n") : "");
  }
  return `Date: ${new Date().toDateString()}
Daily capacity setting: ${fmtMin(db.settings.capacity)}
Open tasks (${openTasks().length} total, top by urgency):
${open.join("\n") || "(none)"}
Inbox (untriaged): ${db.tasks.filter(isInbox).length} | Someday: ${db.tasks.filter(t => !t.done && t.someday).length}
Completions per day, last 14 days (oldest→today): ${doneRow.join(",")}
Habits:
${habits.join("\n") || "(none)"}
Focus time last 7 days: ${fmtMin(focusMin) || "0m"}
Overloaded days ahead (tasks + meetings vs capacity): ${over.join("; ") || "none"}
Calendar, next 7 days:
${calDays.join("\n") || "(no events or calendar not connected)"}
Detected risk flags:
${risks.join("\n") || "(none)"}${act}`;
}

const COACH_SYSTEM = `You are the coach inside Stride, a minimalist task planner. You help the user complete tasks and handle heavy workloads WITHOUT burnout. Cross-check their task plan against their calendar and Mac activity; point out mistakes directly but kindly: overcommitted days, tasks scheduled over meetings, breaking streaks, procrastination patterns, big tasks left unbroken. Never shame; celebrate consistency over volume.

Writing style — strict:
- Plain, warm language a busy reader scans in seconds. No jargon, no filler, no preamble.
- Short sentences. Each bullet under 14 words. Max 3 bullets per section.
- Bold the single most important phrase in each bullet, **like this**.
- Name tasks, apps, and times exactly as given in the data.

Respond in markdown with exactly these sections:
### Habit insights
### Watch out
### How to finish what's open
### Handling many tasks

In "Your next 3 actions": a numbered list — task name, then " — " and a 5-8 word reason.`;

async function aiBreakdown(t) {
  const out = await callAI("You break tasks into small concrete steps. Return ONLY a JSON array of 3-6 short step strings. No prose, no markdown fences.",
    `Task: "${t.title}"${t.notes ? "\nNotes: " + t.notes.slice(0, 300) : ""}${t.est ? "\nEstimate: " + fmtMin(t.est) : ""}`, 2000);
  const m = out.match(/\[[\s\S]*?\]/); if (!m) throw new Error("Unexpected response");
  const arr = JSON.parse(m[0]);
  t.subtasks = arr.slice(0, 7).map(s => ({ title: String(s).slice(0, 140), done: false }));
}

function secIcon(title) {
  const t = title.toLowerCase();
  const paths = [
    [/habit/, "M5 19c8 0 14-6 14-14-8 0-14 6-14 14zM5 19c0-4 2-7 5-9"],
    [/watch|risk|mistake/, "M12 3l10 18H2L12 3zM12 10v5M12 18.2v.6"],
    [/finish|open/, "M12 3a9 9 0 109 9 9 9 0 00-9-9zM8.5 12.5l2.5 2.5 5-6"],
    [/many|handling|load/, "M3 7l9-4 9 4-9 4-9-4zM3 12l9 4 9-4M3 17l9 4 9-4"],
    [/next|action/, "M5 12h14M13 6l6 6-6 6"],
    [/asked|question/, "M21 12a8 8 0 01-8 8H4l2-3a8 8 0 1115-5z"],
    [/unfinished|pick|resume/, "M4 4v6h6M20 9A8 8 0 006 5.3L4 10M4 15a8 8 0 0014 3.7l1.6-3.7"]
  ];
  const p = (paths.find(x => x[0].test(t)) || [0, "M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9L12 3z"])[1];
  return icon(p, 15);
}
function renderReport(md) {
  const parts = []; let cur = { title: "", lines: [] };
  md.split(/\r?\n/).forEach(l => {
    const h = l.match(/^#{1,4}\s+(.*)/);
    if (h) { if (cur.title || cur.lines.join("").trim()) parts.push(cur); cur = { title: h[1].trim(), lines: [] }; }
    else cur.lines.push(l);
  });
  parts.push(cur);
  return parts.filter(p => p.title || p.lines.join("").trim()).map(p => {
    let body = mdToHtml(p.lines.join("\n"));
    if (/next|action/i.test(p.title)) {
      body = body.replace(/<ul>/g, '<ol class="ai-next">').replace(/<\/ul>/g, "</ol>")
        .replace(/<li>([\s\S]*?)<\/li>/g, (m, inner) => {
          const plain = inner.replace(/<[^>]+>/g, "").split(/\s+[—-]\s+/)[0].trim().slice(0, 90);
          return `<li><span class="ai-next-text">${inner}</span>${plain.length > 3 ? `<button class="ai-add" data-addtask="${esc(plain)}">＋ Add</button>` : ""}</li>`;
        });
    }
    return `<div class="ai-sec">${p.title ? `<div class="ai-sec-head">${secIcon(p.title)}<h4>${esc(p.title)}</h4></div>` : ""}${body}</div>`;
  }).join("");
}
function mdToHtml(md) {
  const lines = esc(md).split(/\r?\n/);
  let html = "", inList = false, para = [];
  const flush = () => { if (para.length) { html += "<p>" + para.join(" ") + "</p>"; para = []; } };
  const inline = s => s.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>").replace(/(^|\s)\*(?!\s)([^*]+)\*(?=\s|$|[.,!?])/g, "$1<i>$2</i>");
  for (const raw of lines) {
    const l = raw.trim();
    const h = l.match(/^#{1,4}\s+(.*)/), li = l.match(/^(?:[-*•]|\d+[.)])\s+(.*)/);
    if (h) { flush(); if (inList) { html += "</ul>"; inList = false; } html += "<h4>" + inline(h[1]) + "</h4>"; }
    else if (li) { flush(); if (!inList) { html += "<ul>"; inList = true; } html += "<li>" + inline(li[1]) + "</li>"; }
    else if (!l) { flush(); if (inList) { html += "</ul>"; inList = false; } }
    else para.push(inline(l));
  }
  flush(); if (inList) html += "</ul>";
  return html;
}

document.addEventListener("click", e => {
  const add = e.target.closest("[data-addtask]");
  if (add && !add.disabled) {
    db.tasks.push(newTask({ title: add.dataset.addtask, due: todayStr() }));
    save(); renderNav();
    add.disabled = true; add.textContent = "✓ Added";
    toast("Added to Today");
    return;
  }
  const b = e.target.closest("[data-ai]"); if (!b) return;
  const a = b.dataset.ai;
  if (a === "setup") openSettings(true);
  else if (a === "analyze") runAnalysis(b);
  else if (a === "recall") runRecall(b);
  else if (a === "ask") { const q = $("#aiQ")?.value.trim(); if (q) runQuestion(q, b); }
});
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && e.target.id === "aiQ") { const q = e.target.value.trim(); if (q) runQuestion(q, $("#aiAskBtn")); }
});

/* ---------- daily rollover & first-run ---------- */
function firstRun() {
  if (db.tasks.length || db.habits.length || localStorage.getItem("stride.seen")) return;
  localStorage.setItem("stride.seen", "1");
  const demo = [
    parseCapture("Press P to plan your day today ~5m"),
    parseCapture("Try Focus mode with the F key today !high ~10m"),
    newTask({ title: "Type a task above — words like “tomorrow”, “!high”, “~45m”, “#project” are understood", due: addDays(todayStr(), 1), est: 5 }),
    parseCapture("Explore the command palette with Cmd+K someday"),
  ];
  demo.forEach(t => db.tasks.push(t));
  db.habits.push({ id: uid(), name: "One meaningful task before noon", log: [] });
  // Write directly with savedAt left at 0 so a fresh demo seed can never
  // outrank real data living in stride.db.
  try { localStorage.setItem("stride.v1", JSON.stringify(db)); } catch (e) {}
}

/* ---------- boot ---------- */
firstRun();
applyTheme();
render();

  autoAnalyze();
}, 600);
